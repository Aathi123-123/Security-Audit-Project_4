<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal v1.0</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 40px; }
        .container { background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { color: #2e7d32; }
        .btn { display: inline-block; padding: 10px 20px; background-color: #2e7d32; color: white; text-decoration: none; border-radius: 4px; }
        .btn:hover { background-color: #1b5e20; }
        .success { border: 2px solid #2e7d32; background-color: #f1f8e9; padding: 15px; border-radius: 4px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Secure Portal (Internal Tools)</h1>
        <p>Welcome to the Secure Internal Portal. This site has been audited and hardened against OWASP Top 10 vulnerabilities.</p>
        
        <div class="success">
            <h3>AUDITED & REMEDIATED VERSION</h3>
            <p>Vulnerabilities have been patched. Check the Security Audit Report for details on fixed issues.</p>
        </div>
        
        <br><br>
        <a href="/login" class="btn">Log In</a>
    </div>

</html>
