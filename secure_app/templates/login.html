<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Gateway Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050608;
            --bg-panel: rgba(10, 15, 12, 0.45);
            --border-neon: rgba(0, 230, 118, 0.2);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --emerald: #00e676;
            --emerald-glow: rgba(0, 230, 118, 0.15);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 230, 118, 0.07) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(30, 41, 59, 0.5) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-neon);
            backdrop-filter: blur(30px);
            padding: 50px 40px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 40px rgba(0, 230, 118, 0.05);
            max-width: 440px;
            width: 100%;
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--emerald), transparent);
            border-radius: 28px 28px 0 0;
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-shield {
            color: var(--emerald);
            display: block;
            margin: 0 auto 20px auto;
            text-align: center;
            filter: drop-shadow(0 0 8px rgba(0, 230, 118, 0.4));
        }
        h2 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(135deg, #ffffff 30%, #a7ffd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--emerald);
            box-shadow: 0 0 16px var(--emerald-glow);
            background: rgba(0, 0, 0, 0.6);
        }
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--emerald) 0%, #00b0ff 100%);
            color: #050608;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px var(--emerald-glow);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
            background: linear-gradient(135deg, #33ff99 0%, #00e676 100%);
        }
        .error-container {
            color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.2);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 0.88rem;
            text-align: center;
            font-weight: 500;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 28px;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
            font-weight: 500;
        }
        .back-link:hover {
            color: var(--emerald);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <svg class="icon-shield" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        <h2>Secure Gateway Login</h2>
        
        {% if error %}
            <div class="error-container">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">Authorized User</label>
                <input type="text" id="username" name="username" required autocomplete="off" placeholder="Enter username token">
            </div>
            <div class="form-group">
                <label for="password">Password Token</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">
                Authorize Gateway
            </button>
        </form>
        <a href="/" class="back-link">Return to Node Hub</a>
    </div>
</body>
</html>
